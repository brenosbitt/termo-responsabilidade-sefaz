server {
    listen 80;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1000;

    # Termo de Responsabilidade (padrão) -> /
    location / {
        root /usr/share/nginx/html/termo-responsabilidade;
        try_files $uri $uri/ =404;
    }

    # Termo da Contadoria -> /contadoria/
    location /contadoria/ {
        alias /usr/share/nginx/html/termo-contadoria/;
        try_files $uri $uri/ =404;
    }

    # Redirecionamentos
    location = /contadoria {
        return 301 $scheme://$http_host/contadoria/;
    }
    location = /responsabilidade {
        return 301 $scheme://$http_host/;
    }
    location = /responsabilidade/ {
        return 301 $scheme://$http_host/;
    }

    # Assets compartilhados -> /assets/
    location /assets/ {
        alias /usr/share/nginx/html/assets/;

        location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}